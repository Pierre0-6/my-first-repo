  <option value="plays">Plays</option>
</select>
</select>


  <!-- FILTRE THÉÂTRE -->

  </select>

<p>Mars 2026</p>

tr = une ligne
th = case titre (jours)
td = case normale (dates)
data-day = info cachée pour le code (JS)
chiffre = ce que voit l’utilisateur
-->

<h4>QUEL PRIX ?</h4> <!-- Petit titre qui affiche "QUEL PRIX ?" -->

<div class="price-filter">
  <input type="range" min="0" max="150" value="150">   <!-- Le slider : tu peux glisser pour choisir un prix entre 0 et 150,

  </div>
</div>
